services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasklist
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3002:3001"
    environment:
      DATABASE_URL: mysql://root:root@db:3306/tasklist
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
